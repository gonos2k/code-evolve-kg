name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  format-check:
    name: Format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: science-codeevolve

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check import order
        run: isort --check-only src tests

      - name: Check formatting
        run: black --check src tests

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: science-codeevolve

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  fortran-tests:
    name: Fortran integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: science-codeevolve

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install GNU Fortran
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Fortran tests
        run: pytest tests/fortran/ -v

  kg-type-check:
    name: KG integration type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: science-codeevolve

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Type-check KG/Graphify/Fortran integration
        run: |
          mypy \
            src/codeevolve/prompt/knowledge.py \
            src/codeevolve/prompt/knowledge_gate.py \
            src/codeevolve/utils/graphify_export.py \
            src/codeevolve/utils/knowledge_use.py \
            src/codeevolve/toolchains/fortran.py \
            --ignore-missing-imports \
            --follow-imports=skip \
            --allow-untyped-defs \
            --allow-incomplete-defs

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: science-codeevolve

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Audit installed Python dependencies
        run: pip-audit --local --skip-editable
